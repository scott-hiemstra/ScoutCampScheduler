services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: campscheduler
      MYSQL_DATABASE: camp
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: campscheduler
      DB_NAME: camp
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
